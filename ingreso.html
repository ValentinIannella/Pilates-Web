<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresarme como alumno - Valsy Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="ingreso-page">
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>
  <div class="page">
    <div class="card">
      <h1>Ingresarme como alumno</h1>
      <p>Completá tus datos y en breve te confirmo la disponibilidad de clases.</p>
      <form id="alumnoForm">
        <div class="row"><div><label for="nombre">Nombre</label><input type="text" id="nombre" name="nombre" required></div><div><label for="apellido">Apellido</label><input type="text" id="apellido" name="apellido" required></div></div>
        <div class="row"><div><label for="email">Email</label><input type="email" id="email" name="email" required></div><div><label for="edad">Edad</label><input type="number" id="edad" name="edad" min="10" max="120" required></div></div>
        <div class="row"><div><label for="peso">Peso (kg)</label><input type="number" id="peso" name="peso" min="20" max="300" step="0.1" required></div><div><label for="telefono">WhatsApp (opcional)</label><input type="text" id="telefono" name="telefono" placeholder="+54 9 ..."></div></div>
        <div><label for="patologias">Patologías / lesiones / condiciones</label><textarea id="patologias" name="patologias" placeholder="Ej: lumbalgia, escoliosis, etc."></textarea></div>
        <button type="submit" class="btn">Enviar inscripción</button>
      </form>
      <div class="message" id="mensajeExito">Ingreso exitoso, queda pendiente de confirmación.</div>
      <div class="back-links">
        <a class="back" href="clases.html">← Ver clases y valores </a>
        <a class="back" href="index.html">← Volver al inicio</a>
      </div>
    </div>
  </div>
  
  <script>
    emailjs.init("Ah4u4Y8b5VtmUXfN1");

const form = document.getElementById("alumnoForm");
const mensaje = document.getElementById("mensajeExito");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  emailjs.sendForm("service_758747h", "template_otq2fqg", this)
    .then(() => {
      mensaje.style.display = "block";
      mensaje.innerText = "Ingreso exitoso, en breve te confirmamos disponibilidad.";
      form.reset();
    })
    .catch((error) => {
  console.log("ERROR DETALLE:", error);
  mensaje.style.display = "block";
  mensaje.innerText = "Error al enviar el formulario.";
});
});
  </script>
</body>
</html>
